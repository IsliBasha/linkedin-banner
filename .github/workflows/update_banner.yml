name: Update LinkedIn Banner

# ── Triggers ──────────────────────────────────────────────────
on:
  schedule:
    - cron: '0 0 * * *'    # daily at 00:00 UTC
  workflow_dispatch:         # manual run from the Actions tab

# ── Permissions ───────────────────────────────────────────────
permissions:
  contents: read

jobs:
  update-banner:
    name: Generate & Upload LinkedIn Banner
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ─────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      # ── 3. Dependencies ─────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 4. Playwright browser ────────────────────────────────
      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      # ── 5. Generate banner ───────────────────────────────────
      - name: Generate banner
        env:
          GH_TOKEN:        ${{ secrets.GH_TOKEN }}
          GITHUB_USERNAME: ${{ secrets.GH_USERNAME }}
          PORTFOLIO_URL:   ${{ secrets.PORTFOLIO_URL }}
        run: python generate_banner.py

      # ── 6. Upload to LinkedIn via browser ────────────────────
      - name: Upload banner to LinkedIn
        env:
          LINKEDIN_COOKIES:  ${{ secrets.LINKEDIN_COOKIES }}
          LINKEDIN_EMAIL:    ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
        run: python linkedin_upload_browser.py

      # ── 7. Persist banner as artifact ────────────────────────
      - name: Upload banner artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linkedin-banner-${{ github.run_number }}
          path: |
            banner.png
            debug_*.png
          retention-days: 14
