name: Update LinkedIn Banner

# ── Triggers ──────────────────────────────────────────────────
on:
  schedule:
    - cron: '0 6 * * *'    # daily at 06:00 UTC — banner ready before you wake up
  workflow_dispatch:

# ── Permissions ───────────────────────────────────────────────
permissions:
  contents: write            # needed to commit banner.png back to the repo

jobs:
  generate-banner:
    name: Generate Banner
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate banner
        env:
          GH_TOKEN:        ${{ secrets.GH_TOKEN }}
          GITHUB_USERNAME: ${{ secrets.GH_USERNAME }}
          PORTFOLIO_URL:   ${{ secrets.PORTFOLIO_URL }}
        run: python generate_banner.py

      # Commit banner.png back to the repo so the local uploader can pull it
      - name: Commit updated banner
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add banner.png
          git diff --cached --quiet || git commit -m "chore: update banner.png [skip ci]"
          git push

      - name: Upload banner artifact
        uses: actions/upload-artifact@v4
        with:
          name: linkedin-banner-${{ github.run_number }}
          path: banner.png
          retention-days: 14

  # ─────────────────────────────────────────────────────────────
  # Upload to LinkedIn — no local device needed
  #
  # Required GitHub secrets:
  #   LINKEDIN_COOKIES  base64 JSON from export_linkedin_cookies.py
  #
  # Optional GitHub secrets (for Tailscale IP masking):
  #   TAILSCALE_CLIENT_ID      Tailscale OAuth client ID
  #   TAILSCALE_CLIENT_SECRET  Tailscale OAuth client secret
  #   TAILSCALE_EXIT_NODE      Tailscale hostname of your home machine exit node
  #
  # Optional GitHub variable (repository variable, not secret):
  #   TAILSCALE_ENABLED        set to "true" to activate Tailscale routing
  # ─────────────────────────────────────────────────────────────
  upload-banner:
    name: Upload to LinkedIn
    runs-on: ubuntu-latest
    needs: generate-banner
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Download the freshly generated banner from the generate job
      - name: Download banner artifact
        uses: actions/download-artifact@v4
        with:
          name: linkedin-banner-${{ github.run_number }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Optional: route traffic through your home machine's IP ──────────────
      # Set TAILSCALE_ENABLED to "true" in repository Variables to activate.
      # This prevents LinkedIn from seeing GitHub Actions IP ranges.
      - name: Connect to Tailscale
        if: vars.TAILSCALE_ENABLED == 'true'
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_CLIENT_SECRET }}
          tags: tag:ci

      - name: Route via home machine exit node
        if: vars.TAILSCALE_ENABLED == 'true'
        run: |
          EXIT_NODE="${{ secrets.TAILSCALE_EXIT_NODE }}"
          if [ -n "$EXIT_NODE" ]; then
            tailscale set --exit-node="$EXIT_NODE" \
              && echo "✓ Traffic routing via Tailscale exit node: $EXIT_NODE" \
              || echo "⚠ Exit node offline — falling back to GitHub Actions IP"
          else
            echo "⚠ TAILSCALE_EXIT_NODE not set — traffic uses GitHub Actions IP"
          fi

      # ── Install Chrome and virtual display ──────────────────────────────────
      - name: Install Xvfb and Chrome
        run: |
          sudo apt-get update -q
          sudo apt-get install -y xvfb

          # Install Google Chrome stable
          wget -qO- https://dl.google.com/linux/linux_signing_key.pub \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/google.gpg
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

          google-chrome-stable --version

      - name: Start Xvfb virtual display
        run: |
          Xvfb :99 -screen 0 1280x1100x24 &
          echo "DISPLAY=:99" >> "$GITHUB_ENV"
          sleep 1
          echo "✓ Xvfb started on display :99"

      - name: Launch Chrome with remote debugging
        run: |
          DISPLAY=:99 google-chrome-stable \
            --remote-debugging-port=9222 \
            --user-data-dir=/tmp/linkedin-banner-chrome \
            --no-first-run \
            --no-default-browser-check \
            --no-sandbox \
            --disable-dev-shm-usage \
            about:blank &

          # Wait for CDP port to be reachable
          for i in $(seq 1 15); do
            if curl -sf http://localhost:9222/json/version >/dev/null 2>&1; then
              CHROME_VER=$(curl -s http://localhost:9222/json/version | python3 -c "import json,sys; print(json.load(sys.stdin)['Browser'])")
              echo "✓ Chrome ready: $CHROME_VER"
              break
            fi
            echo "  waiting for Chrome ($i/15)…"
            sleep 2
          done

      # ── Upload banner ────────────────────────────────────────────────────────
      - name: Upload banner to LinkedIn
        env:
          LINKEDIN_COOKIES: ${{ secrets.LINKEDIN_COOKIES }}
          DISPLAY: :99
        run: python3 upload_ci.py

      # ── Cookie health check ──────────────────────────────────────────────────
      - name: Verify LinkedIn session is still valid
        env:
          LINKEDIN_COOKIES: ${{ secrets.LINKEDIN_COOKIES }}
        run: python3 check_cookie_expiry.py

      # ── Upload debug screenshots on failure ──────────────────────────────────
      - name: Upload debug screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linkedin-banner-debug-${{ github.run_number }}
          path: debug_*.png
          retention-days: 7
