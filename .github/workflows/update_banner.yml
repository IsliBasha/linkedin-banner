name: Update LinkedIn Banner

# ── Triggers ──────────────────────────────────────────────────
on:
  schedule:
    - cron: '0 6 * * *'    # daily at 06:00 UTC — banner ready before you wake up
  workflow_dispatch:

# ── Permissions ───────────────────────────────────────────────
permissions:
  contents: write            # needed to commit banner.png back to the repo

jobs:
  generate-banner:
    name: Generate Banner
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate banner
        env:
          GH_TOKEN:        ${{ secrets.GH_TOKEN }}
          GITHUB_USERNAME: ${{ secrets.GH_USERNAME }}
          PORTFOLIO_URL:   ${{ secrets.PORTFOLIO_URL }}
        run: python generate_banner.py

      # Commit banner.png back to the repo so the local uploader can pull it
      - name: Commit updated banner
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add banner.png
          git diff --cached --quiet || git commit -m "chore: update banner.png [skip ci]"
          git push

      - name: Upload banner artifact
        uses: actions/upload-artifact@v4
        with:
          name: linkedin-banner-${{ github.run_number }}
          path: banner.png
          retention-days: 14
